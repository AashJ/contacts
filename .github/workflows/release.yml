name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            label: macos-x64
          - os: macos-14
            label: macos-arm64
          - os: ubuntu-latest
            label: linux-x64
          - os: windows-latest
            label: windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          OUT="contacts-${TAG}-${{ matrix.label }}"
          bun build src/cli.ts --compile --outfile "${OUT}"
          tar -czf "${OUT}.tar.gz" "${OUT}"

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          $out = "contacts-$tag-${{ matrix.label }}.exe"
          bun build src/cli.ts --compile --outfile $out
          Compress-Archive -Path $out -DestinationPath "$out.zip"

      - name: Upload build artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: "*.tar.gz"
          if-no-files-found: error

      - name: Upload build artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: "*.zip"
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          mapfile -t ARCHIVES < <(find . -maxdepth 1 -type f \( -name "*.tar.gz" -o -name "*.zip" \) | sort)
          if [ "${#ARCHIVES[@]}" -eq 0 ]; then
            echo "No release archives found." >&2
            exit 1
          fi
          sha256sum "${ARCHIVES[@]}" > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          overwrite_files: true
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/checksums.txt
